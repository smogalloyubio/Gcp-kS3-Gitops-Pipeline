apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: prod-project
  namespace: argocd
spec:
  description: Restricted Project

  sourceRepos:
    - https://github.com/smogalloyubio/Gcp-kS3-Gitops-Pipeline.git

  destinations:
    - namespace: prod
      server: https://kubernetes.default.svc

  clusterResourceWhitelist: []
  clusterResourceBlacklist: [] 
  
  namespaceResourceWhitelist:
    - group: apps
      kind: Deployment 
    - group: ""
      kind: Service
  namespaceResourceBlacklist: []
