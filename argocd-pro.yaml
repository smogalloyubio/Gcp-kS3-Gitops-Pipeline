apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: prod-project
  namespace: argocd
spec:
  description: Production Project

  sourceRepos:
    - '*'

  destinations:
    - namespace: prod
      server: https://kubernetes.default.svc

  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - group: apps
      kind: Deployment
    - group: v1
      kind: Service
