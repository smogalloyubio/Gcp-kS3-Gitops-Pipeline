name: Build and Deploy Web Application to GCP k3s

on:
  push:
    branches:
      - qa-engineer
    paths:
      - '.github/workflows/Google_cloud_deploy.yaml'
      - 'static/**'
      - 'kustomized/**'
      - 'Dockerfile'

permissions:
  contents: write
  id-token: write 

jobs:
  gitleak-scan-security: 
    name: Run Gitleaks Security Scan
    runs-on: ubuntu-latest # Fixed the 'ubuntun' typo
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleak scan 
        run: |
          docker run --rm \
              -v "${{ github.workspace }}:/repo" \
              zricethezav/gitleaks:latest detect \
              --source=/repo \
              --report-format=json \
              --report-path=/repo/gitleaks-report.json \
              --redact \
              --exit-code 0

      - name: Upload Artifact Of Gitleak Scan 
        uses: actions/upload-artifact@v4 
        with: 
          name: gitleak-report
          path: ${{ github.workspace }}/gitleaks-report.json
          if-no-files-found: warn

  Checkov-Terraform:
    name: Checkov Terraform Scan 
    needs: [gitleak-scan-security]
    runs-on: ubuntu-lastest 
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
      
      - name: Setup Python 
        uses: actions/setup-python@v5 
        with:
          python-version: "3.12"

      - name: install checkov 
        runs: pip install checkov 


      - name: Run Terraform scan 
        run: |
          checkov -d ./terraform \
            --framework terraform \
            --output json > checkov-terraform-report.json || true
