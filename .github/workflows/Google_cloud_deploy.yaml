name: Build and Deploy Web Application to GCP k3s

on:
  push:
    branches:
      - qa-engineer
    paths:
      - '.github/workflows/Google_cloud_deploy.yaml'
      - 'static/**'
      - 'kustomized/**'
      - 'Dockerfile'

permissions:
  contents: write
  id-token: write 

jobs:
  gitleak-scan-security: 
    name: Run Gitleaks Security Scan
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleak scan 
        run: |
          docker run --rm \
              -v "${{ github.workspace }}:/repo" \
              zricethezav/gitleaks:latest detect \
              --source=/repo \
              --report-format=json \
              --report-path=/repo/gitleaks-report.json \
              --redact \
              --exit-code 0

      - name: Upload Artifact Of Gitleak Scan 
        uses: actions/upload-artifact@v4 
        with: 
          name: gitleak-report
          path: ${{ github.workspace }}/gitleaks-report.json
          if-no-files-found: warn

  Checkov-Terraform:
    name: Checkov Terraform Scan 
    needs: [gitleak-scan-security]
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Checkov Scan
        uses: bridgecrewio/checkov-action@master
        id: checkov
        with:
          directory: ./Terraform
          framework: terraform
          output_format: json
          output_file_path: checkov-terraform-report.json
          download_external_modules: false
          skip_path: '**/.terraform/**'   
          soft_fail: true